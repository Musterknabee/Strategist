[pytest]
testpaths = tests
python_files = test_*.py
addopts = 
    --strict-markers
    --tb=short
    -ra
    -v
    --durations=10
    -p no:cacheprovider

# Constitutional markers
markers =
    constitutional: Law-enforcing tests for the validator system.
    integration: End-to-end integration tests.
    unit: Isolated component tests.
    redundancy: Prove stability under repeated runs.
    invariant: Anti-regression invariant tests — fast CI constitutional gate.

# Filter out pydantic v1 warnings if any creep in
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
