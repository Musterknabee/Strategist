name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  repository-truth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package with dev extras
        run: python -m pip install -e '.[dev]'
      - name: Dev environment check
        run: python scripts/environment_check.py --include-extra dev
      - name: Source health
        run: python scripts/source_health.py
      - name: Transient purge dry-run plan
        run: python scripts/purge_repo_transients.py --json
      - name: Repository truth
        run: python scripts/repository_truth_check.py
      - name: Migration truth
        run: python scripts/migration_truth_check.py
      - name: Dev environment check after truth gates
        run: python scripts/environment_check.py --include-extra dev
      - name: OpenAPI contract snapshot
        run: python scripts/openapi_contract_snapshot.py --check
      - name: UI facade contract snapshot
        run: python scripts/ui_facade_contract_snapshot.py --check --no-static-fallback
      - name: Frontend UI facade contract check
        run: python scripts/frontend_ui_contract_check.py
      - name: API import surface regression
        run: python -m pytest -q tests/api/test_api_import_surface_lazy.py tests/api/test_ui_detail_route_decomposition.py
      - name: Paper execution import-surface regression
        run: python -m pytest -q tests/application/test_paper_execution_import_laziness.py
      - name: Paper broker CLI decomposition regression
        run: python -m pytest -q tests/cli/test_paper_broker_parser_decomposition.py
      - name: Research route contract-laziness regressions
        run: >-
          python -m pytest -q
          tests/api/test_research_preflight_route.py
          tests/api/test_research_gate_artifact_route.py
          tests/api/test_semantic_adjudication_readiness_route.py
          tests/api/test_semantic_adjudication_bundle_route.py
          tests/api/test_semantic_adjudication_handoff_artifact_route.py
          tests/api/test_research_router_mounting.py
      - name: Focused readiness and disposal-board regressions
        run: >-
          python -m pytest -q
          tests/constitutional/test_readiness_placeholder_token_policy.py
          tests/application/test_ui_semantic_validator_handoff_clearance_release_disposal_board.py
          tests/api/test_ui_semantic_validator_handoff_clearance_release_disposal_board_route.py
      - name: Single-tenant deployment preflight gate
        env:
          STRATEGY_VALIDATOR_MODE: PRODUCTION
          STRATEGY_VALIDATOR_API_TOKEN: ci-non-placeholder-token-with-enough-entropy-1234567890
          STRATEGY_VALIDATOR_API_TOKEN_SCOPES: operator:command:write,operator:projection:read
          STRATEGY_VALIDATOR_LEDGER_DB_PATH: /tmp/strategy-validator-ci/ledger.sqlite3
          STRATEGY_VALIDATOR_LEDGER_BACKUP_DIR: /tmp/strategy-validator-ci/backups
          STRATEGY_VALIDATOR_ARTIFACT_ROOT: /tmp/strategy-validator-ci/artifacts
        run: STRATEGY_VALIDATOR_API_TOKEN_SCOPES=operator:command:write,operator:projection:read strategy-validator-single-tenant-preflight --prepare --verify-backup-restore --require-ready
      - name: Single-tenant API HTTP smoke
        env:
          STRATEGY_VALIDATOR_MODE: PRODUCTION
          STRATEGY_VALIDATOR_API_TOKEN: ci-non-placeholder-token-with-enough-entropy-1234567890
          STRATEGY_VALIDATOR_API_TOKEN_SCOPES: operator:command:write,operator:projection:read
          STRATEGY_VALIDATOR_LEDGER_DB_PATH: /tmp/strategy-validator-ci/ledger.sqlite3
          STRATEGY_VALIDATOR_LEDGER_BACKUP_DIR: /tmp/strategy-validator-ci/backups
          STRATEGY_VALIDATOR_ARTIFACT_ROOT: /tmp/strategy-validator-ci/artifacts
        run: python3 scripts/single_tenant_api_smoke.py --token-source env
      - name: Single-tenant deployment bundle dry run
        run: strategy-validator-single-tenant-bundle --output /tmp/strategy-validator-ci/deployment-bundle # single_tenant_deployment_bundle
      - name: Single-tenant deployment acceptance dry run
        run: strategy-validator-single-tenant-acceptance --bundle-root /tmp/strategy-validator-ci/deployment-bundle # single_tenant_deployment_acceptance
      - name: Single-tenant deployment evidence dry run
        run: strategy-validator-single-tenant-evidence --bundle-root /tmp/strategy-validator-ci/deployment-bundle # single_tenant_deployment_evidence
      - name: Clean archive selection check
        run: python scripts/package_repo.py --check
      - name: Package clean archive
        run: python scripts/package_repo.py --output "$RUNNER_TEMP/strategy-validator-clean.zip" --json
      - name: Verify clean archive
        run: python scripts/verify_repo_archive.py "$RUNNER_TEMP/strategy-validator-clean.zip" --repo-root . --json
