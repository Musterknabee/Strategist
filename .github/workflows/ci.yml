name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  strategist-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/strategist-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/strategist-web/package-lock.json
      - name: npm ci
        run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: test
        run: npm run test
      - name: build
        run: npm run build

  package-minimal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Repo hygiene gate (fail-closed)
        run: python -c "from strategy_validator.cli.hygiene_check import main; raise SystemExit(main([]))"
      - name: Install base package only
        run: pip install -e .
      - name: Base import smoke
        run: |
          python - <<'PY'
          import strategy_validator
          import strategy_validator.core.config
          import strategy_validator.contracts.operational
          import strategy_validator.ledger._append_only
          print("base install smoke passed")
          PY

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Repo hygiene gate (fail-closed)
        run: python -c "from strategy_validator.cli.hygiene_check import main; raise SystemExit(main([]))"
      - name: Install full runtime and dev tools
        run: pip install -e ".[dev]"
      - name: Release candidate chain (generate -> assess -> verify bundle)
        run: |
          set -euo pipefail
          OUT_DIR="$(python -c "from strategy_validator.cli.release_candidate import main; raise SystemExit(main(['generate']))")"
          CANDIDATE="$(basename "$OUT_DIR")"
          python -c "from strategy_validator.cli.release_candidate import main; raise SystemExit(main(['assess','--candidate','$CANDIDATE','--skip-frontend']))"
          python -c "from strategy_validator.cli.release_candidate import main; raise SystemExit(main(['verify-bundle','--candidate','$CANDIDATE']))"
      - name: Import boundaries (import-linter)
        env:
          PYTHONIOENCODING: utf-8
        run: python -c "from click.testing import CliRunner; from importlinter.cli import lint_imports_command; r=CliRunner().invoke(lint_imports_command, []); import sys; sys.stdout.buffer.write((r.output or '').encode('utf-8','replace')); raise SystemExit(r.exit_code)"
      - name: Full test suite
        run: pytest -v
      - name: Anti-regression invariants (fast constitutional gate)
        run: pytest tests/constitutional/test_anti_regression_invariants.py -v
